<h2>Shopping Cart</h2>

<div *ngIf="cartItems.length === 0">
  <p>🛒 Your cart is empty. Start shopping!</p>
</div>

<div *ngFor="let item of cartItems" style="border-bottom: 1px solid #ddd; padding: 10px 0; display: flex; align-items: center; gap: 20px;">
  <img [src]="item.url" [alt]="item.name" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;">
  <div style="flex: 1;">
    <h4>{{ item.name }}</h4>
    <p>Price: {{ item.price | currency }}</p>
    <div>
      <label>Quantity: </label>
      <input type="number" [(ngModel)]="item.quantity" (ngModelChange)="updateQuantity(item.id, item.quantity || 1)" min="1" style="width: 60px; padding: 4px;">
    </div>
  </div>
  <div style="text-align: right;">
    <p><strong>{{ (item.price * (item.quantity || 1)) | currency }}</strong></p>
    <button (click)="removeItem(item.id)" style="background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">
      Remove
    </button>
  </div>
</div>

<div *ngIf="cartItems.length > 0" style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #007bff;">
  <div style="font-size: 1.5rem;">
    <strong>Total: {{ getTotal() | currency }}</strong>
  </div>
  <br>
  <a routerLink="/checkout" style="text-decoration: none;">
    <button style="background: #28a745; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 1.2rem; cursor: pointer;">
      Proceed to Checkout
    </button>
  </a>
</div>
