<div *ngIf="product; else notFound" style="display: flex; gap: 40px; padding: 20px;">
  <div>
    <img [src]="product.url" [alt]="product.name" style="width: 400px; height: 400px; object-fit: cover; border-radius: 8px;">
  </div>
  <div>
    <h2>{{ product.name }}</h2>
    <p><strong>Price:</strong> {{ product.price | currency }}</p>
    <p><strong>Description:</strong> {{ product.description }}</p>
    <div>
      <label>Quantity: </label>
      <input type="number" [(ngModel)]="quantity" min="1" style="width: 60px; padding: 4px;">
    </div>
    <br>
    <button (click)="addToCart()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">
      Add to Cart
    </button>
    <br><br>
    <a routerLink="/">← Back to Products</a>
  </div>
</div>

<ng-template #notFound>
  <h2>Product not found</h2>
  <a routerLink="/">← Back to Products</a>
</ng-template>
